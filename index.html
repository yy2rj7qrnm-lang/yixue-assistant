<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意学助手 - 智能教育平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 32px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .feature {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
        }
        .feature-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .feature-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .feature-desc {
            font-size: 13px;
            color: #6b7280;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>意学助手</h1>
        <p class="subtitle">AI赋能个性化学习，让每个孩子都有专属学习伙伴</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📷</div>
                <div class="feature-title">智能错题识别</div>
                <div class="feature-desc">OCR拍照自动识别</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">学习诊断报告</div>
                <div class="feature-desc">多维度能力分析</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-title">智能推荐题目</div>
                <div class="feature-desc">个性化学习路径</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div class="feature-title">AI智能伴学</div>
                <div class="feature-desc">24小时在线答疑</div>
            </div>
        </div>

        <div class="buttons">
            <a href="/yixue-assistant/preview.html" class="btn btn-primary">查看完整预览</a>
            <a href="https://github.com/yy2rj7qrnm-lang/yixue-assistant" class="btn btn-secondary">GitHub</a>
        </div>
    </div>
</body>
</html>
